<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./icon.png" />
    <title>seashell — visual .zshrc editor</title>
    <meta
      name="description"
      content="seashell — a calm, safe desktop editor for your ~/.zshrc. structured controls, a live source view, a diff before every save. it never corrupts your file."
    />
    <meta name="theme-color" content="#0e1014" />
    <link rel="canonical" href="https://seashell.cuzeacflorin.fr/" />
    <!-- the hero banner is the LCP element; start its fetch during HTML parse -->
    <link rel="preload" as="image" href="./banner.png" fetchpriority="high" />

    <!-- Open Graph / social previews -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://seashell.cuzeacflorin.fr/" />
    <meta property="og:title" content="seashell — visual .zshrc editor" />
    <meta
      property="og:description"
      content="a calm, safe desktop editor for your ~/.zshrc. it never corrupts your file."
    />
    <meta property="og:image" content="https://seashell.cuzeacflorin.fr/banner.png" />
    <meta property="og:image:width" content="3452" />
    <meta property="og:image:height" content="2172" />
    <meta
      property="og:image:alt"
      content="the seashell app window showing a visual editor for a ~/.zshrc file"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="seashell — visual .zshrc editor" />
    <meta
      name="twitter:description"
      content="a calm, safe desktop editor for your ~/.zshrc. it never corrupts your file."
    />
    <meta name="twitter:image" content="https://seashell.cuzeacflorin.fr/banner.png" />
    <meta
      name="twitter:image:alt"
      content="the seashell app window showing a visual editor for a ~/.zshrc file"
    />
    <!-- restore the saved theme before first paint to avoid a dark→light flash -->
    <script>
      try {
        const t = localStorage.getItem("seashell-theme");
        if (t) {
          document.documentElement.setAttribute("data-theme", t);
          const m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", t === "dark" ? "#0e1014" : "#f7f8fa");
        }
      } catch {}
      // browser-initiated scrolls (restoring position on refresh, jumping to a #hash)
      // must be instant — with the global scroll-behavior:smooth they would animate and
      // the page "scrolls by itself" on reload. only user-initiated clicks should glide,
      // so smooth is re-enabled on the first interaction (which precedes any anchor click).
      document.documentElement.style.scrollBehavior = "auto";
      const enableSmooth = () => {
        document.documentElement.style.scrollBehavior = "";
      };
      window.addEventListener("pointerdown", enableSmooth, { once: true, capture: true });
      window.addEventListener("keydown", enableSmooth, { once: true, capture: true });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
